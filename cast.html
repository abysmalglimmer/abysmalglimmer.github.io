<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survivor Characters · Oliver Beeby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel+Decorative:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
  font-family: 'Block Berthold';
  src: url('fonts/BlockBE-Heavy.woff2') format('woff2'),
       url('fonts/BlockBE-Heavy.woff') format('woff');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f4f0ea;
      --surface: #ffffff;
      --text:    #181510;
      --muted:   #8a8070;
      --border:  #e2dbd0;
      --accent:  #d4540a;
      --radius:  3px;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      display: flex;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }
 
    #nav-root { display: flex; }
 
    #main { flex: 1; min-width: 0; }
 
    /* ── Hero (shared) ─────────────────────────────────────── */
    .sv-hero {
      background: var(--text);
      padding: 48px 48px 40px;
      position: relative;
      overflow: hidden;
    }
    .sv-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px,
        transparent 1px, transparent 12px
      );
      pointer-events: none;
    }
    .sv-hero-inner { max-width: 740px; margin: 0 auto; position: relative; }
    .sv-eyebrow {
      font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); font-weight: 600; margin-bottom: 12px;
    }
    .sv-hero h1 {
      font-family: 'Block Berthold', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700; line-height: 0.95; color: #fff;
    }
    .sv-hero-sub {
      margin-top: 14px; font-size: 0.8rem;
      color: rgba(255,255,255,0.38); font-weight: 300;
    }

    /* ── Tab bar ───────────────────────────────────────────── */
    .tab-bar {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      gap: 28px;
      border-bottom: 1px solid var(--border);
      margin-top: 28px;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 12px 0 14px;
      font-family: 'Block Berthold', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      cursor: pointer;
      position: relative;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -1px;
      height: 2px;
      background: var(--accent);
    }
    .tab-count {
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: 6px;
      letter-spacing: 0.04em;
      font-weight: 400;
    }
 
    /* ── Season browser ────────────────────────────────────── */
    #view-seasons { padding-bottom: 80px; }
 
    .seasons-list {
      max-width: 740px; margin: 20px auto 0;
      padding: 0 48px; display: flex; flex-direction: column; gap: 6px;
    }
 
    .season {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; transition: box-shadow 0.2s;
    }
    .season:hover { box-shadow: 0 3px 16px rgba(0,0,0,0.09); }
 
    .season-header {
      display: flex; align-items: center; padding: 14px 18px;
      cursor: pointer; user-select: none; gap: 14px;
    }
    .accent-bar { width: 5px; height: 42px; border-radius: 1px; flex-shrink: 0; }
    .season-meta { flex: 1; min-width: 0; }
    .season-num {
      font-family: 'Block Berthold', sans-serif; font-size: 0.7rem;
      letter-spacing: 0.16em; color: var(--muted); margin-bottom: 3px;
    }
    .season-title {
      font-family: 'Block Berthold', sans-serif; font-size: 1.28rem;
      letter-spacing: 0.04em; line-height: 1; color: var(--text);
    }
    .season-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; font-weight: 300; }
    .allstar-badge {
      font-family: 'Block Berthold', sans-serif; font-size: 0.6rem;
      letter-spacing: 0.12em; background: #f0eaf8; color: #7c5fa8;
      padding: 2px 7px; border-radius: 2px; margin-left: 8px; vertical-align: middle; display: inline-block;
    }
    .chevron {
      width: 18px; height: 18px; display: flex; align-items: center;
      justify-content: center; color: var(--muted); transition: transform 0.25s; flex-shrink: 0;
    }
    .chevron svg { display: block; }
    .season.open .chevron { transform: rotate(180deg); }
 
    .season-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
    .season.open .season-body { grid-template-rows: 1fr; }
    .season-body-inner { overflow: hidden; }
 
    /* ── Cast list ─────────────────────────────────────────── */
    .cast-list { border-top: 1px solid var(--border); }
 
    .cast-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 18px 9px 18px;
      border-bottom: 1px solid #f0ebe4;
      background: #faf7f3;
      transition: background 0.1s;
    }
    .cast-row:last-child { border-bottom: none; }
    .cast-row:hover { background: #f0ebe4; }
    .cast-row.is-winner { background: #fdf8ee; }
    .cast-row.is-winner:hover { background: #f5edce; }
 
    .fav-star {
      font-size: 0.75rem; color: var(--accent);
      width: 14px; flex-shrink: 0; text-align: center;
    }
    .cast-placement {
      font-family: 'Block Berthold', sans-serif; font-size: 0.78rem;
      letter-spacing: 0.06em; color: var(--muted); width: 34px; flex-shrink: 0;
    }
    .cast-name {
      font-size: 0.85rem; color: var(--text);
      text-decoration: none; font-weight: 400; cursor: pointer;
    }
    .cast-name:hover { color: var(--accent); text-decoration: underline; }

    /* Wraps name + bio dot so they hug each other */
    .cast-name-wrap {
      flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0;
    }
    /* Subtle indicator that a contestant has a bio written */
    .bio-dot {
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.85;
      letter-spacing: 0.05em;
      line-height: 1;
      flex-shrink: 0;
      cursor: help;
    }
    .returns-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      flex-shrink: 0; opacity: 0.5;
    }
    .cast-note {
      font-size: 0.68rem; color: var(--muted); font-style: italic; font-weight: 300;
    }
    .cast-status {
      font-family: 'Block Berthold', sans-serif; font-size: 0.72rem;
      letter-spacing: 0.1em; padding: 3px 8px; border-radius: 2px; flex-shrink: 0;
    }
    .cast-status.winner   { background: #fdf0c8; color: #7a5808; }
    .cast-status.runnerup { background: #f0f0f0; color: #606060; }
    .cast-status.jury     { background: #eeeaf6; color: #6048a0; }
    .cast-status.prejury  { color: var(--border); padding: 3px 0; }
 
    /* ── Contestant view ───────────────────────────────────── */
    #view-contestant { display: none; padding-bottom: 80px; }
 
    .c-hero-name {
      font-family: 'Block Berthold', sans-serif;
      font-size: clamp(2rem, 7vw, 3.8rem);
      letter-spacing: 0.03em; line-height: 0.95; color: #fff;
      margin-top: 10px;
    }
    .c-hero-meta {
      margin-top: 12px; font-size: 0.78rem;
      color: rgba(255,255,255,0.38); font-weight: 300; letter-spacing: 0.04em;
    }
    .back-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2px; padding: 6px 14px;
      font-family: 'Block Berthold', sans-serif; font-size: 0.85rem;
      letter-spacing: 0.1em; cursor: pointer; color: rgba(255,255,255,0.55);
      transition: all 0.15s; display: inline-block;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
 
    .c-body { max-width: 740px; margin: 36px auto 0; padding: 0 48px; }
 
    .c-bio {
      font-size: 0.9rem; line-height: 1.75; color: #555;
      font-weight: 300; max-width: 580px; margin-bottom: 36px;
      padding-bottom: 28px; border-bottom: 1px solid var(--border);
      white-space: pre-line;
    }
 
    .c-section-label {
      font-family: 'Block Berthold', sans-serif; font-size: 1rem;
      letter-spacing: 0.14em; color: var(--muted); margin-bottom: 14px;
    }
 
    .c-seasons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 10px;
    }
 
    .c-season-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px 14px 18px;
      border-left-width: 4px; transition: box-shadow 0.2s;
    }
    .c-season-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
 
    .c-sc-num {
      font-family: 'Block Berthold', sans-serif; font-size: 0.68rem;
      letter-spacing: 0.16em; color: var(--muted); margin-bottom: 2px;
    }
    .c-sc-name {
      font-family: 'Block Berthold', sans-serif; font-size: 1.05rem;
      letter-spacing: 0.04em; line-height: 1.1; color: var(--text); margin-bottom: 10px;
    }
    .c-sc-placement { font-size: 0.85rem; font-weight: 500; color: var(--text); }
 
    .c-sc-status {
      font-family: 'Block Berthold', sans-serif; font-size: 0.72rem;
      letter-spacing: 0.1em; padding: 3px 8px; border-radius: 2px;
      display: inline-block; margin-top: 6px;
    }
    .c-sc-status.winner   { background: #fdf0c8; color: #7a5808; }
    .c-sc-status.runnerup { background: #f0f0f0; color: #606060; }
    .c-sc-status.jury     { background: #eeeaf6; color: #6048a0; }
    .c-sc-status.prejury  { background: #f0ebe4; color: var(--muted); }
 
    .c-sc-note {
      font-size: 0.7rem; color: var(--muted); font-style: italic; margin-top: 4px;
    }
    .c-sc-fav {
      font-size: 0.7rem; color: var(--accent); font-weight: 500; margin-top: 8px;
    }
 
    /* key legend */
    .cast-legend {
      display: flex; gap: 16px; align-items: center;
      margin: 14px auto 0; max-width: 740px; padding: 0 48px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--muted); }
    .legend-pip { font-size: 0.68rem; }

    /* ── Favourites view ───────────────────────────────────── */
    #view-favourites { padding-bottom: 80px; display: none; }

    .fav-intro {
      max-width: 740px; margin: 20px auto 0; padding: 0 48px;
      font-size: 0.82rem; color: var(--muted); font-weight: 300; line-height: 1.6;
    }

    .fav-list {
      max-width: 740px; margin: 20px auto 0;
      padding: 0 48px; display: flex; flex-direction: column; gap: 8px;
    }

    .fav-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow 0.2s, transform 0.15s;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .fav-card:hover {
      box-shadow: 0 3px 16px rgba(0,0,0,0.09);
      transform: translateY(-1px);
    }

    .fav-star-large {
      font-size: 1.1rem;
      color: var(--accent);
      flex-shrink: 0;
    }

    .fav-main { flex: 1; min-width: 0; }

    .fav-name {
      font-family: 'Block Berthold', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .fav-bio-preview {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.5;
      max-width: 480px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .fav-bio-empty {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
      font-weight: 300;
      opacity: 0.7;
    }

    .fav-seasons-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .fav-season-tag {
      font-family: 'Block Berthold', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 2px;
      background: #f0ebe4;
      color: var(--muted);
      border-left: 3px solid;
    }

    @media (max-width: 540px) {
      .fav-card { flex-direction: row; }
      .tab-bar { padding: 0 24px; gap: 18px; }
      .fav-list, .fav-intro, .seasons-list { padding: 0 24px; }
      .cast-legend { padding: 0 24px; }
    }
  </style>
</head>
<body>
 
  <div id="nav-root"></div>
 
  <div id="main">
 
    <!-- ── Season Browser ── -->
    <div id="view-seasons">
      <div class="sv-hero">
        <div class="sv-hero-inner">
          <div class="sv-eyebrow">Up to Heroes vs Villains</div>
          <h1>CHARACTER<br>DIRECTORY</h1>
          <p class="sv-hero-sub">Spoiler warning! Full boot orders are listed below.</p>
        </div>
      </div>

      <div class="tab-bar" id="tab-bar-seasons">
        <button class="tab-btn active" data-tab="seasons">By Season</button>
        <button class="tab-btn" data-tab="favourites">Favourites <span class="tab-count" id="fav-count-seasons"></span></button>
      </div>
 
      <div class="cast-legend">
        <div class="legend-item"><span class="legend-pip" style="color:var(--accent)">★</span> My top 3</div>
        <div class="legend-item"><span class="cast-status winner" style="font-size:0.62rem;padding:2px 6px">WINNER</span></div>
        <div class="legend-item"><span class="cast-status runnerup" style="font-size:0.62rem;padding:2px 6px">RUNNER-UP</span></div>
        <div class="legend-item"><span class="cast-status jury" style="font-size:0.62rem;padding:2px 6px">JURY</span></div>
        <div class="legend-item"><span style="font-size:0.75rem;color:var(--muted)">●</span> Multi-season player</div>
        <div class="legend-item"><span style="opacity:0.55;color:var(--muted)">…</span> Has a bio</div>
      </div>
 
      <div class="seasons-list" id="seasons-list"></div>
    </div>

    <!-- ── Favourites View ── -->
    <div id="view-favourites">
      <div class="sv-hero">
        <div class="sv-hero-inner">
          <div class="sv-eyebrow">My Top 3 Each Season</div>
          <h1>FAVOURITE<br>CHARACTERS</h1>
          <p class="sv-hero-sub">Every contestant I've picked as a favourite, gathered in one place.</p>
        </div>
      </div>

      <div class="tab-bar" id="tab-bar-favourites">
        <button class="tab-btn" data-tab="seasons">By Season</button>
        <button class="tab-btn active" data-tab="favourites">Favourites <span class="tab-count" id="fav-count-favourites"></span></button>
      </div>

      <p class="fav-intro" id="fav-intro"></p>
      <div class="fav-list" id="fav-list"></div>
    </div>
 
    <!-- ── Contestant Profile ── -->
    <div id="view-contestant">
      <div class="sv-hero">
        <div class="sv-hero-inner">
          <button class="back-btn" id="back-btn">← All Seasons</button>
          <div class="c-hero-name" id="c-name"></div>
          <div class="c-hero-meta" id="c-meta"></div>
        </div>
      </div>
      <div class="c-body">
        <p class="c-bio" id="c-bio"></p>
        <div class="c-section-label">Appeared In</div>
        <div class="c-seasons-grid" id="c-seasons-grid"></div>
      </div>
    </div>
 
  </div><!-- end #main -->
 
  <script src="nav.js"></script>
  <script src="cast-data.js"></script>
  <script>
    const { contestants, seasons } = window.CastData;
 
    // ─── Helpers ────────────────────────────────────────────
    function ordinal(n) {
      const v = n % 100;
      if (v >= 11 && v <= 13) return n + 'th';
      switch (n % 10) {
        case 1: return n + 'st';
        case 2: return n + 'nd';
        case 3: return n + 'rd';
        default: return n + 'th';
      }
    }
 
    function statusInfo(placement, jury) {
      if (placement === 1)              return { label: 'WINNER',    cls: 'winner'   };
      if (placement === 2 && !jury)     return { label: 'RUNNER-UP', cls: 'runnerup' };
      if (placement === 3 && !jury)     return { label: 'RUNNER-UP', cls: 'runnerup' };
      if (jury)                         return { label: 'JURY',      cls: 'jury'     };
      return                                   { label: '—',         cls: 'prejury'  };
    }

    function hasBio(id) {
      const c = contestants[id];
      return !!(c && c.bio && c.bio.trim().length > 0);
    }
 
    // Which contestant IDs appear in more than one season?
    const multiSeason = new Set();
    const countMap = {};
    seasons.forEach(s => s.cast.forEach(c => { countMap[c.id] = (countMap[c.id] || 0) + 1; }));
    Object.entries(countMap).forEach(([id, n]) => { if (n > 1) multiSeason.add(id); });

    // Build the favourites set: every contestant who is favourite in at least one season,
    // along with which seasons they were favourites in.
    function buildFavouritesData() {
      const favMap = new Map(); // id -> { id, seasons: [season, season, ...] }
      seasons.forEach(season => {
        (season.favourites || []).forEach(id => {
          if (!favMap.has(id)) favMap.set(id, { id, seasons: [] });
          favMap.get(id).seasons.push(season);
        });
      });
      // Sort by name for predictable display
      return [...favMap.values()].sort((a, b) => {
        const an = (contestants[a.id]?.name || a.id).toLowerCase();
        const bn = (contestants[b.id]?.name || b.id).toLowerCase();
        return an.localeCompare(bn);
      });
    }
 
    // ─── Season Browser ─────────────────────────────────────
    function renderSeasonBrowser() {
      const list = document.getElementById('seasons-list');
      list.innerHTML = '';
 
      seasons.forEach(season => {
        const el = document.createElement('div');
        el.className = 'season';
 
        const badge = season.allstar ? `<span class="allstar-badge">RETURNEES</span>` : '';
 
        el.innerHTML = `
          <div class="season-header">
            <div class="accent-bar" style="background:${season.color}"></div>
            <div class="season-meta">
              <div class="season-num">Season ${String(season.number).padStart(2,'0')} · ${season.year}</div>
              <div class="season-title">${season.name}${badge}</div>
              <div class="season-sub">${season.cast.length} contestants · click to expand</div>
            </div>
            <div class="chevron">
              <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
                <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
          </div>
          <div class="season-body">
            <div class="season-body-inner">
              <div class="cast-list" id="cast-s${season.number}"></div>
            </div>
          </div>
        `;
 
        const header = el.querySelector('.season-header');
        const castEl = el.querySelector(`#cast-s${season.number}`);
        let built = false;
 
        header.addEventListener('click', () => {
          el.classList.toggle('open');
          if (el.classList.contains('open') && !built) {
            buildCastRows(season, castEl);
            built = true;
          }
        });
 
        list.appendChild(el);
      });
    }
 
    function buildCastRows(season, container) {
      const sorted = [...season.cast].sort((a, b) => a.placement - b.placement);
 
      container.innerHTML = sorted.map(entry => {
        const c = contestants[entry.id];
        const name = c ? c.name : entry.id;
        const isFav = season.favourites.includes(entry.id);
        const isMulti = multiSeason.has(entry.id);
        const bioFlag = hasBio(entry.id);
        const { label, cls } = statusInfo(entry.placement, entry.jury);
        const noteHtml = entry.note
          ? `<span class="cast-note">${entry.note}</span>` : '';
        const multiDot = isMulti
          ? `<span class="returns-dot" title="Appears in multiple seasons"></span>` : '';
        const bioDot = bioFlag
          ? `<span class="bio-dot" title="Has a bio">…</span>` : '';
        const rowCls = `cast-row${entry.placement === 1 ? ' is-winner' : ''}`;
 
        return `
          <div class="${rowCls}">
            <span class="fav-star">${isFav ? '★' : ''}</span>
            <span class="cast-placement">${ordinal(entry.placement)}</span>
            <span class="cast-name-wrap">
              <a class="cast-name" href="#contestant/${entry.id}">${name}</a>
              ${bioDot}
            </span>
            ${multiDot}
            ${noteHtml}
            <span class="cast-status ${cls}">${label}</span>
          </div>
        `;
      }).join('');
    }

    // ─── Favourites View ─────────────────────────────────────
    function renderFavouritesView() {
      const data = buildFavouritesData();
      const total = data.length;

      // Update the small counts shown on each tab
      document.getElementById('fav-count-seasons').textContent  = `(${total})`;
      document.getElementById('fav-count-favourites').textContent = `(${total})`;

      const intro = document.getElementById('fav-intro');
      intro.textContent = `${total} characters picked as favourites across ${seasons.length} seasons. Click any name for their full profile.`;

      const list = document.getElementById('fav-list');
      list.innerHTML = data.map(({ id, seasons: favSeasons }) => {
        const c = contestants[id];
        const name = c ? c.name : id;
        const bio = c && c.bio ? c.bio.trim() : '';
        const bioHtml = bio
          ? `<div class="fav-bio-preview">${bio}</div>`
          : `<div class="fav-bio-empty">No bio yet.</div>`;

        const tagsHtml = favSeasons.map(s => `
          <span class="fav-season-tag" style="border-left-color:${s.color}">
            S${String(s.number).padStart(2,'0')} · ${s.name}
          </span>
        `).join('');

        return `
          <a class="fav-card" href="#contestant/${id}">
            <span class="fav-star-large">★</span>
            <div class="fav-main">
              <div class="fav-name">${name}</div>
              ${bioHtml}
              <div class="fav-seasons-tags">${tagsHtml}</div>
            </div>
          </a>
        `;
      }).join('');
    }
 
    // ─── Contestant Profile ──────────────────────────────────
    function renderContestantView(id) {
      const c = contestants[id];
      if (!c) {
        document.getElementById('c-name').textContent = 'Unknown';
        document.getElementById('c-bio').textContent = '';
        document.getElementById('c-seasons-grid').innerHTML = '';
        return;
      }
 
      // Gather all appearances
      const appearances = [];
      seasons.forEach(season => {
        const entry = season.cast.find(e => e.id === id);
        if (entry) appearances.push({ season, entry, isFav: season.favourites.includes(id) });
      });
 
      const seasonWord = appearances.length === 1 ? 'season' : 'seasons';
 
      document.getElementById('c-name').textContent  = c.name;
      document.getElementById('c-meta').textContent  = `${appearances.length} ${seasonWord} so far`;
      document.getElementById('c-bio').textContent   = c.bio || '';
 
      const grid = document.getElementById('c-seasons-grid');
      grid.innerHTML = appearances.map(({ season, entry, isFav }) => {
        const { label, cls } = statusInfo(entry.placement, entry.jury);
        const allstarHtml = season.allstar
          ? `<span class="allstar-badge" style="margin-left:0;margin-top:4px;display:inline-block">RETURNEES</span>` : '';
        const noteHtml = entry.note
          ? `<div class="c-sc-note">${entry.note}</div>` : '';
        const favHtml = isFav
          ? `<div class="c-sc-fav">★ Favourite this season</div>` : '';
 
        return `
          <div class="c-season-card" style="border-left-color:${season.color}">
            <div class="c-sc-num">S${String(season.number).padStart(2,'0')} · ${season.year}</div>
            <div class="c-sc-name">${season.name}</div>
            ${allstarHtml}
            <div class="c-sc-placement" style="margin-top:${season.allstar?'8px':'0'}">${ordinal(entry.placement)} place</div>
            <div><span class="c-sc-status ${cls}">${label}</span></div>
            ${noteHtml}
            ${favHtml}
          </div>
        `;
      }).join('');
    }
 
    // ─── Router ──────────────────────────────────────────────
    function route() {
      const hash = window.location.hash;
      const viewS = document.getElementById('view-seasons');
      const viewF = document.getElementById('view-favourites');
      const viewC = document.getElementById('view-contestant');

      // Default: hide all, then show the matching one
      viewS.style.display = 'none';
      viewF.style.display = 'none';
      viewC.style.display = 'none';
 
      if (hash.startsWith('#contestant/')) {
        const id = decodeURIComponent(hash.slice('#contestant/'.length));
        renderContestantView(id);
        viewC.style.display = 'block';
      } else if (hash === '#favourites') {
        viewF.style.display = 'block';
      } else {
        viewS.style.display = 'block';
      }
      window.scrollTo(0, 0);
    }
 
    document.getElementById('back-btn').addEventListener('click', () => {
      window.history.back();
    });

    // Wire up tab clicks (both tab bars share the same data-tab values)
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        if (tab === 'favourites') {
          window.location.hash = '#favourites';
        } else {
          // Clear hash to land on the season browser default
          if (window.location.hash) {
            history.pushState('', document.title, window.location.pathname + window.location.search);
            route();
          }
        }
      });
    });
 
    window.addEventListener('hashchange', route);
 
    // Init
    renderSeasonBrowser();
    renderFavouritesView();
    route();
  </script>
</body>
</html>
