<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oliver Beeby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      display: flex;
      min-height: 100vh;
      background: #f7f5f2;
      color: #1a1a1a;
    }

    #nav-root { display: flex; }

    .content {
      flex: 1;
      padding: 60px 48px;
      max-width: 720px;
    }

    h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #444;
      font-weight: 300;
      margin-bottom: 12px;
    }

    .page-links {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .page-link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid #e8e4de;
      border-radius: 6px;
      padding: 16px 20px;
      text-decoration: none;
      color: inherit;
      background: #fff;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .page-link-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border-color: #ccc;
    }

    .page-link-label {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .page-link-desc {
      font-size: 0.8rem;
      color: #888;
      font-weight: 300;
      margin-top: 2px;
    }

    .page-link-arrow {
      margin-left: auto;
      color: #bbb;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div id="nav-root"></div>

  <div class="content">
    <h1>Hello.</h1>
    <p>Mostly Survivor stuff, for now...</p>
    

    <div class="page-links">
      <a href="survivor.html" class="page-link-card">
        <div>
          <div class="page-link-label">Survivor</div>
          <div class="page-link-desc">Watch log &amp; ratings for all 49 seasons</div>
        </div>
        <div class="page-link-arrow">→</div>
      </a>
      <a href="cast.html" class="page-link-card">
        <div>
          <div class="page-link-label">Survivor Characters</div>
          <div class="page-link-desc">A directory of characters for seasons I've seen so far.</div>
        </div>
        <div class="page-link-arrow">→</div>
      </a>
      <!-- MORE TO COME! -->
    </div>
  </div>

  <script src="nav.js"></script>
</body>
</html>
